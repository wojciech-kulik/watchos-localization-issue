---
name: MyApp
options:
  deploymentTarget:
    iOS: 18.0
    watchOS: 10.0
  developmentLanguage: en
  groupSortPosition: folderFirst
  generateEmptyDirectories: false
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    ENABLE_USER_SCRIPT_SANDBOXING: false
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM:
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: "MyApp"

targets:
  # ─────────────────────────────────────────
  # iOS App
  # ─────────────────────────────────────────
  MyApp:
    type: application
    platform: iOS
    deploymentTarget: 18.0
    sources:
      - path: MyApp
      - path: Shared
    dependencies:
      - target: Watch
    settings:
      base:
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.weather"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: "com.test.test-app"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: "com.test.test-app"

  # ─────────────────────────────────────────
  # watchOS App
  # ─────────────────────────────────────────
  Watch:
    type: application
    platform: watchOS
    deploymentTarget: 10.0
    sources:
      - path: Watch
      - path: Shared
    dependencies:
      - target: WatchWidgets
    settings:
      base:
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: "$(COMPANION_APP_BUNDLE_ID)"
      configs:
        Debug:
          COMPANION_APP_BUNDLE_ID: "com.test.test-app"
          PRODUCT_BUNDLE_IDENTIFIER: "com.test.test-app.watch"
        Release:
          COMPANION_APP_BUNDLE_ID: "com.test.test-app"
          PRODUCT_BUNDLE_IDENTIFIER: "com.test.test-app.watch"

  # ─────────────────────────────────────────
  # watchOS Widget Extension
  # ─────────────────────────────────────────
  WatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: 10.0
    sources:
      - path: WatchWidgets
      - path: Shared
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    info:
      path: WatchWidgets/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: "com.apple.widgetkit-extension"
        NSWidgetWantsLocation: YES
    settings:
      base:
        SWIFT_EMIT_LOC_STRINGS: YES
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: "com.test.test-app.watch.widgets"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: "com.test.test-app.watch.widgets"
    scheme:
      environmentVariables:
        - variable: _XCWidgetKind
          value: Watch.MyTestWidget
        - variable: _XCWidgetDefaultView
          value: timeline
        - variable: _XCWidgetFamily
          value: accessoryCircular

# ─────────────────────────────────────────
# Top-level schemes
# ─────────────────────────────────────────
schemes:
  MyApp:
    build:
      targets:
        MyApp: all
    run:
      config: Debug
      environmentVariables:
        - variable: OS_ACTIVITY_MODE
          value: disable
          isEnabled: true
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
